[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# Pin the toolchain so `forge build` produces identical bytecode across every
# environment (local dev, CI, Vercel). Bytecode drift breaks the deterministic
# CREATE2 address — every consumer that hardcodes `getBridgeAddress()` would
# point at a different on-chain contract. `optimizer=false` matches what's
# already deployed at 0xC317FB32D65f7C19F77818eE2d6CE8bfa3030bA4; changing it
# would break that address.
solc = "0.8.30"
optimizer = false

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
