name: Setup workspace
description: >
  Install Node + corepack, restore cached yarn + aztec deps, install what's
  missing, compile contract artifacts, and extend PATH with the aztec CLI.
  Every job that needs a ready-to-use monorepo starts with this action.

inputs:
  cache-suffix:
    description: >
      Optional suffix appended to toolchain-sensitive cache keys (yarn +
      turbo). Set this when the job runs in a container with a different
      libc/toolchain than the default host runner — otherwise native addons
      in cached node_modules can cross-contaminate between jobs.
    required: false
    default: ""

outputs:
  aztec-version:
    description: Aztec version string extracted from apps/bridge/package.json.
    value: ${{ steps.aztec-version.outputs.version }}

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "24"

    - name: Enable Corepack
      shell: bash
      run: corepack enable

    # Cache everything yarn touches: the download store, the install state,
    # and — crucially — every `node_modules` tree across the workspace. The
    # previous setup only cached `.yarn/cache` (tarballs), which meant
    # `yarn install` still re-extracted node_modules and ran `node-gyp`
    # against every native addon (bcrypto, lmdb, esbuild, @swc/core, ...).
    # That's ~80 seconds per job. Caching node_modules itself drops install
    # to well under 10s on a hit.
    #
    # Key on yarn.lock so any dependency bump busts the cache automatically.
    - name: Restore yarn + node_modules cache
      uses: actions/cache@v4
      with:
        path: |
          .yarn/cache
          .yarn/install-state.gz
          node_modules
          apps/*/node_modules
          packages/*/node_modules
          packages/contracts/*/node_modules
          e2e/node_modules
        # Bump the `v2` suffix to force-bust the cache whenever this
        # action's paths change — otherwise actions/cache reuses whatever's
        # under the matching key even if it was saved under a narrower path
        # set, leaving native addons to rebuild every time.
        key: yarn-v2-${{ runner.os }}${{ inputs.cache-suffix && format('-{0}', inputs.cache-suffix) }}-${{ hashFiles('yarn.lock') }}
        restore-keys: |
          yarn-v2-${{ runner.os }}${{ inputs.cache-suffix && format('-{0}', inputs.cache-suffix) }}-

    - name: Install dependencies
      shell: bash
      run: yarn install --immutable

    - name: Extract Aztec version
      id: aztec-version
      shell: bash
      run: |
        VERSION=$(jq -r '.dependencies["@aztec/aztec.js"]' apps/bridge/package.json)
        VERSION_NO_V=${VERSION#v}
        echo "version=$VERSION_NO_V" >> $GITHUB_OUTPUT

    # Cache the full Aztec CLI install tree. The installer lays down files
    # into multiple locations (~/.aztec/bin symlinks, ~/.aztec/versions/<v>/
    # with bin/ + node_modules/, plus a version-pin config). Cache the whole
    # ~/.aztec tree to avoid re-running the installer.
    #
    # `foundry` (anvil) is also installed by the script into ~/.foundry/bin
    # during local-network spin-up. Cache that too so integration tests can
    # find `anvil` after a cache hit.
    - name: Cache Aztec + Foundry
      id: aztec-cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.aztec
          ~/.foundry
        key: aztec-${{ runner.os }}-${{ steps.aztec-version.outputs.version }}

    - name: Install Aztec CLI
      if: steps.aztec-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        export CI=1
        export FOUNDRY_DIR="$HOME/.foundry"
        curl -fsSL "https://install.aztec.network/${{ steps.aztec-version.outputs.version }}/install" | VERSION="${{ steps.aztec-version.outputs.version }}" bash

    - name: Update PATH
      shell: bash
      run: |
        echo "$HOME/.aztec/versions/${{ steps.aztec-version.outputs.version }}/bin" >> $GITHUB_PATH
        echo "$HOME/.aztec/versions/${{ steps.aztec-version.outputs.version }}/node_modules/.bin" >> $GITHUB_PATH
        echo "$HOME/.foundry/bin" >> $GITHUB_PATH

    # Cache compiled contract artifacts. Keyed on the noir source + Nargo.toml
    # so any contract change busts the cache cleanly.
    - name: Cache contract artifacts
      id: contracts-cache
      uses: actions/cache@v4
      with:
        path: |
          packages/contracts/aztec/noir/target
          packages/contracts/aztec/noir/artifacts
        key: contracts-${{ runner.os }}-${{ steps.aztec-version.outputs.version }}-${{ hashFiles('packages/contracts/aztec/noir/**/*.nr', 'packages/contracts/aztec/noir/**/Nargo.toml') }}

    - name: Compile contracts
      if: steps.contracts-cache.outputs.cache-hit != 'true'
      shell: bash
      run: yarn workspace @gregojuice/aztec build

    # Turbo's local cache. When hit, `yarn build` / `yarn typecheck` / `yarn
    # lint` replay cached outputs instead of re-running. Keyed on source
    # files the tasks read — turbo itself then hashes them internally, so
    # this cache key is just "commit-shaped" to pick up any incremental
    # work the last run on this branch did.
    #
    # `restore-keys` fallback lets a first CI run on a new branch restore
    # the most recent main-branch turbo cache and do only an incremental
    # rebuild on top.
    - name: Cache turbo outputs
      uses: actions/cache@v4
      with:
        path: |
          .turbo
          apps/*/.turbo
          packages/*/.turbo
          packages/contracts/*/.turbo
          e2e/.turbo
          apps/*/dist
          packages/*/dist
          packages/contracts/*/dist
          packages/contracts/ethereum/generated
          packages/contracts/ethereum/solidity/out
        key: turbo-${{ runner.os }}${{ inputs.cache-suffix && format('-{0}', inputs.cache-suffix) }}-${{ github.sha }}
        restore-keys: |
          turbo-${{ runner.os }}${{ inputs.cache-suffix && format('-{0}', inputs.cache-suffix) }}-
