name: Integration Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vitest:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Extract Aztec version
        id: aztec-version
        run: |
          VERSION=$(jq -r '.dependencies["@aztec/aztec.js"]' apps/bridge/package.json)
          VERSION_NO_V=${VERSION#v}
          echo "version=$VERSION_NO_V" >> $GITHUB_OUTPUT

      - name: Install Aztec CLI
        run: |
          export CI=1
          export FOUNDRY_DIR="$HOME/.foundry"
          curl -fsSL "https://install.aztec.network/${{ steps.aztec-version.outputs.version }}/install" | VERSION="${{ steps.aztec-version.outputs.version }}" bash

      - name: Update PATH
        run: |
          echo "$HOME/.aztec/versions/${{ steps.aztec-version.outputs.version }}/bin" >> $GITHUB_PATH
          echo "$HOME/.aztec/versions/${{ steps.aztec-version.outputs.version }}/node_modules/.bin" >> $GITHUB_PATH

      - name: Build workspace
        run: yarn build

      - name: Start local-network
        run: |
          aztec start --local-network > /tmp/aztec-network.log 2>&1 &
          echo "AZTEC_PID=$!" >> $GITHUB_ENV

      - name: Wait for network readiness
        run: |
          for i in $(seq 1 90); do
            if curl -sf -X POST -H 'Content-Type: application/json' \
                -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
                http://localhost:8545 > /dev/null \
              && curl -sf -X POST -H 'Content-Type: application/json' \
                -d '{}' http://localhost:8080 > /dev/null; then
              echo "local-network is ready"
              exit 0
            fi
            sleep 2
          done
          echo "local-network did not become ready"
          tail -200 /tmp/aztec-network.log || true
          exit 1

      - name: Run @gregojuice/aztec integration tests
        run: yarn workspace @gregojuice/aztec test
        env:
          AZTEC_NODE_URL: http://localhost:8080
          ETHEREUM_HOST: http://localhost:8545

      - name: Run @gregojuice/embedded-wallet integration tests
        run: yarn workspace @gregojuice/embedded-wallet test
        env:
          AZTEC_NODE_URL: http://localhost:8080
          ETHEREUM_HOST: http://localhost:8545

      - name: Stop local-network
        if: always()
        run: |
          if [ -n "${AZTEC_PID:-}" ]; then
            kill "$AZTEC_PID" 2>/dev/null || true
          fi

      - name: Upload network logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: aztec-network-log
          path: /tmp/aztec-network.log
          retention-days: 7
