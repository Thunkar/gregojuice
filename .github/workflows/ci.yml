name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

# Skip stale runs when a PR gets pushed rapidly.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Fast gate: format + lint + build. Building with `tsc -b` gives us
  # typechecking for free while also producing the artifacts that the
  # integration + e2e jobs need — they pick them up from the turbo cache
  # without redoing any work.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Format check
        run: yarn format

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build

  integration:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Run @gregojuice/aztec integration tests
        run: yarn workspace @gregojuice/aztec test

      - name: Run @gregojuice/embedded-wallet integration tests
        run: yarn workspace @gregojuice/embedded-wallet test

  # Playwright e2e tests. Runs in parallel with integration — both gate on
  # `build`, neither depends on the other.
  e2e:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      # System deps are apt-installed and not cacheable, but the fetch is
      # fast when they're already present; the chromium binary itself lives
      # in ~/.cache/ms-playwright and is cached by the setup action, so a
      # warm `playwright install chromium` is effectively a no-op.
      - name: Install Playwright system deps
        run: yarn workspace @gregojuice/e2e exec playwright install-deps chromium

      - name: Install Playwright browsers
        run: yarn workspace @gregojuice/e2e exec playwright install chromium

      - name: Build workspace
        run: yarn build

      - name: Run e2e tests
        run: yarn workspace @gregojuice/e2e test
        env:
          CI: "1"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
