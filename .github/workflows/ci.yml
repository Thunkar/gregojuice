name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read


# Skip stale runs when a PR gets pushed rapidly.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Fast gate: format + build + typecheck + lint. `yarn build` runs first so
  # lint/typecheck replay from the turbo cache instead of triggering their
  # own `^build` dependency.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Format check
        run: yarn format

      - name: Build
        run: yarn build --output-logs=new-only

      - name: Typecheck
        run: yarn typecheck --output-logs=new-only

      - name: Lint
        run: yarn lint --output-logs=new-only

      # Container jobs can't see actions/cache entries written by host-runner
      # jobs (separate scope). Publish the build outputs as a workflow
      # artifact so the e2e job can download them — artifacts cross the
      # container boundary cleanly.
      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: |
            apps/*/dist
            packages/*/dist
            packages/contracts/*/dist
            packages/contracts/aztec/noir/artifacts
            packages/contracts/aztec/noir/target
            packages/contracts/ethereum/generated
            packages/contracts/ethereum/solidity/out
          retention-days: 1
          include-hidden-files: false

  integration:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Run @gregojuice/aztec integration tests
        run: yarn workspace @gregojuice/aztec test

      - name: Run @gregojuice/embedded-wallet integration tests
        run: yarn workspace @gregojuice/embedded-wallet test

  # Playwright e2e tests. Runs in parallel with integration — both gate on
  # `build`, neither depends on the other.
  #
  # Runs inside Playwright's official container image which ships chromium
  # + all apt system deps preinstalled. Avoids `playwright install` /
  # `install-deps` entirely — those were the biggest time sinks on warm
  # runners. Keep the tag pinned to the exact version resolved in yarn.lock
  # (@playwright/test@1.59.1) so the bundled browser matches what the test
  # runner expects; bump both together when upgrading Playwright.
  e2e:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 60
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@v4

      # The Playwright image ships Node + browsers + X libs but strips the
      # C/C++ toolchain, so native addons (bcrypto, lmdb, ...) can't build
      # during `yarn install`. Add the toolchain before the setup action runs.
      - name: Install native build toolchain
        run: |
          apt-get update
          apt-get install -y --no-install-recommends build-essential python3 jq
          rm -rf /var/lib/apt/lists/*

      # Native addons (bcrypto/lmdb) built in this container link against a
      # different libc than the host-runner jobs. Tag the cache so we never
      # cross-hit those prebuilt binaries.
      - uses: ./.github/actions/setup
        with:
          cache-suffix: playwright-container

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-outputs
          path: .

      - name: Run e2e tests
        run: yarn workspace @gregojuice/e2e test
        env:
          CI: "1"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
