name: Deploy to Vercel

on:
  # On push to main, deploy to production unconditionally.
  push:
    branches:
      - main
  # On PRs, deploy preview after CI passes. pull_request_target runs in the
  # context of the base repo so it has access to secrets (needed for Vercel
  # deploys + PR comments) — we wait for the CI workflow on the PR head to
  # finish successfully before building.
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      production:
        description: "Deploy to production"
        required: false
        default: true
        type: boolean

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

permissions:
  contents: read
  pull-requests: write
  checks: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request_target' }}

jobs:
  authorize:
    # Guard against running untrusted PR code under pull_request_target (which
    # has access to secrets). Trusted authors (repo collaborators with write+)
    # are auto-allowed; external contributors need the `deploy-preview` label.
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: Check author association or label
        uses: actions/github-script@v7
        with:
          script: |
            const trusted = ['OWNER', 'MEMBER', 'COLLABORATOR'];
            const assoc = context.payload.pull_request.author_association;
            if (trusted.includes(assoc)) {
              core.info(`Author association ${assoc} is trusted — proceeding.`);
              return;
            }
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (labels.includes('deploy-preview')) {
              core.info('deploy-preview label present — proceeding.');
              return;
            }
            core.setFailed(
              `PR from ${assoc} without deploy-preview label. ` +
              `Add the label manually after reviewing the PR to deploy.`,
            );

  wait-for-ci:
    # Only gate on CI for PRs — push to main and manual dispatch skip this.
    needs: [authorize]
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Wait for CI build
        uses: fountainhead/action-wait-for-check@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: build
          ref: ${{ github.event.pull_request.head.sha }}
          timeoutSeconds: 3000
          intervalSeconds: 15

      - name: Wait for CI integration
        uses: fountainhead/action-wait-for-check@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: integration
          ref: ${{ github.event.pull_request.head.sha }}
          timeoutSeconds: 3000
          intervalSeconds: 15

      - name: Wait for CI e2e
        uses: fountainhead/action-wait-for-check@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: e2e
          ref: ${{ github.event.pull_request.head.sha }}
          timeoutSeconds: 3600
          intervalSeconds: 15

  deploy:
    runs-on: ubuntu-latest
    needs: [authorize, wait-for-ci]
    # On push to main and workflow_dispatch, authorize + wait-for-ci are both
    # skipped — allow deploy through. On PRs, require wait-for-ci to have
    # succeeded (which in turn requires authorize to have succeeded).
    if: ${{ always() && (needs.wait-for-ci.result == 'success' || (needs.wait-for-ci.result == 'skipped' && github.event_name != 'pull_request_target')) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # pull_request_target defaults to the base ref — check out the PR head
          # so we deploy the actual proposed changes.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: ./.github/actions/setup

      # Strip `local.json` from every app's network list before anything
      # builds. The apps pick up whatever JSONs exist under config/networks/
      # at build time — removing local.json keeps developer-only networks
      # out of the deployed bundle.
      - name: Remove local network configs
        run: rm -f apps/*/src/config/networks/local.json

      - name: Build packages
        run: yarn build

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # ── Bridge deployment ──────────────────────────────────────────────
      - name: Pull Vercel Environment (Bridge)
        env:
          VERCEL_PROJECT_ID: ${{ secrets.BRIDGE_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/bridge

      - name: Build and deploy Bridge
        id: deploy-bridge
        env:
          VERCEL_PROJECT_ID: ${{ secrets.BRIDGE_PROJECT_ID }}
        run: |
          if ([ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]) || ([ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ inputs.production }}" == "true" ]); then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/bridge
            DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --archive=tgz --yes --cwd apps/bridge)
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/bridge
            DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --archive=tgz --yes --cwd apps/bridge)
          fi
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      # ── FPC Operator deployment ────────────────────────────────────────
      - name: Pull Vercel Environment (FPC Operator)
        env:
          VERCEL_PROJECT_ID: ${{ secrets.FPC_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/fpc-operator

      - name: Build and deploy FPC Operator
        id: deploy-fpc
        env:
          VERCEL_PROJECT_ID: ${{ secrets.FPC_PROJECT_ID }}
          VITE_BRIDGE_URL: ${{ vars.VITE_BRIDGE_URL }}
        run: |
          if ([ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]) || ([ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ inputs.production }}" == "true" ]); then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/fpc-operator
            DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --archive=tgz --yes --cwd apps/fpc-operator)
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/fpc-operator
            DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --archive=tgz --yes --cwd apps/fpc-operator)
          fi
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      # ── Swap deployment ────────────────────────────────────────────────
      - name: Pull Vercel Environment (Swap)
        env:
          VERCEL_PROJECT_ID: ${{ secrets.SWAP_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/swap

      - name: Build and deploy Swap
        id: deploy-swap
        env:
          VERCEL_PROJECT_ID: ${{ secrets.SWAP_PROJECT_ID }}
          VITE_WEB_WALLET_URL: ${{ vars.VITE_WEB_WALLET_URL }}
        run: |
          if ([ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]) || ([ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ inputs.production }}" == "true" ]); then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/swap
            DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --archive=tgz --yes --cwd apps/swap)
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/swap
            DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --archive=tgz --yes --cwd apps/swap)
          fi
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      # ── PR Comment ─────────────────────────────────────────────────────
      - name: Comment deployment URLs on PR
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const body = [
              '🚀 Deployed to Vercel!',
              '',
              '**Bridge:** ${{ steps.deploy-bridge.outputs.url }}',
              '**FPC Operator:** ${{ steps.deploy-fpc.outputs.url }}',
              '**Swap:** ${{ steps.deploy-swap.outputs.url }}',
            ].join('\n');

            // Update the existing bot comment in place if present, so PRs
            // don't accumulate one comment per push.
            const marker = '<!-- gregojuice-deploy-urls -->';
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            const fullBody = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: fullBody,
              });
            }
