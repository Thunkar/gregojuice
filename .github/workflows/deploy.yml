name: Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request_target:
    branches:
      - main
  workflow_dispatch:
    inputs:
      production:
        description: "Deploy to production"
        required: false
        default: true
        type: boolean

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VITE_BRIDGE_CONTRACT_ADDRESS: ${{ vars.VITE_BRIDGE_CONTRACT_ADDRESS }}

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Extract Aztec version
        id: aztec-version
        run: |
          VERSION=$(jq -r '.dependencies["@aztec/aztec.js"]' apps/bridge/package.json)
          VERSION_NO_V=${VERSION#v}
          echo "version=$VERSION_NO_V" >> $GITHUB_OUTPUT
          echo "Aztec version: $VERSION_NO_V"

      - name: Install Aztec CLI
        run: |
          export CI=1
          export FOUNDRY_DIR="$HOME/.foundry"
          echo "Running version-specific installer for ${{ steps.aztec-version.outputs.version }}..."
          curl -fsSL "https://install.aztec.network/${{ steps.aztec-version.outputs.version }}/install" | VERSION="${{ steps.aztec-version.outputs.version }}" bash
          echo "Installation completed"
          ls -la ~/.aztec/versions/${{ steps.aztec-version.outputs.version }}/bin/

      - name: Update path
        run: |
          echo "$HOME/.aztec/versions/${{ steps.aztec-version.outputs.version }}/bin" >> $GITHUB_PATH
          echo "$HOME/.aztec/versions/${{ steps.aztec-version.outputs.version }}/node_modules/.bin" >> $GITHUB_PATH

      - name: Build packages
        run: yarn build

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # ── Bridge deployment ──────────────────────────────────────────────
      - name: Pull Vercel Environment (Bridge)
        env:
          VERCEL_PROJECT_ID: ${{ secrets.BRIDGE_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/bridge

      - name: Build and deploy Bridge
        id: deploy-bridge
        env:
          VERCEL_PROJECT_ID: ${{ secrets.BRIDGE_PROJECT_ID }}
        run: |
          if ([ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]) || ([ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ inputs.production }}" == "true" ]); then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/bridge
            DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --archive=tgz --yes --cwd apps/bridge)
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/bridge
            DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --archive=tgz --yes --cwd apps/bridge)
          fi
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      # ── FPC Operator deployment ────────────────────────────────────────
      - name: Pull Vercel Environment (FPC Operator)
        env:
          VERCEL_PROJECT_ID: ${{ secrets.FPC_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/fpc-operator

      - name: Build and deploy FPC Operator
        id: deploy-fpc
        env:
          VERCEL_PROJECT_ID: ${{ secrets.FPC_PROJECT_ID }}
          VITE_BRIDGE_URL: ${{ vars.VITE_BRIDGE_URL }}
        run: |
          if ([ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]) || ([ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ inputs.production }}" == "true" ]); then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/fpc-operator
            DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --archive=tgz --yes --cwd apps/fpc-operator)
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/fpc-operator
            DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --archive=tgz --yes --cwd apps/fpc-operator)
          fi
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      # ── Swap deployment ────────────────────────────────────────────────
      - name: Pull Vercel Environment (Swap)
        env:
          VERCEL_PROJECT_ID: ${{ secrets.SWAP_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/swap

      - name: Build and deploy Swap
        id: deploy-swap
        env:
          VERCEL_PROJECT_ID: ${{ secrets.SWAP_PROJECT_ID }}
          VITE_WEB_WALLET_URL: ${{ vars.VITE_WEB_WALLET_URL }}
        run: |
          if ([ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]) || ([ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ inputs.production }}" == "true" ]); then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/swap
            DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --archive=tgz --yes --cwd apps/swap)
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/swap
            DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --archive=tgz --yes --cwd apps/swap)
          fi
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      # ── PR Comment ─────────────────────────────────────────────────────
      - name: Comment deployment URLs on PR
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Deployed to Vercel!\n\n**Bridge:** ${{ steps.deploy-bridge.outputs.url }}\n**FPC Operator:** ${{ steps.deploy-fpc.outputs.url }}\n**Swap:** ${{ steps.deploy-swap.outputs.url }}'
            })
